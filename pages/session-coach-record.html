<!-- ══════════════════════════════════════════════════════════
     COACH RECORD — コーチ記録
     練習メニュー・コーチング環境をコーチ側で記録
═══════════════════════════════════════════════════════════ -->

<div class="sf-page">
  <div class="sf-page-hero sf-hero-coach">
    <img src="statics/coach.png" alt="コーチ記録" class="sf-hero-img">
    <div class="sf-hero-overlay">
      <div class="sf-hero-eyebrow">COACH LOG</div>
      <h1 class="sf-hero-title">📝 コーチ記録</h1>
      <p class="sf-hero-sub">練習メニューの設定とコーチング環境を記録します</p>
    </div>
  </div>

  <!-- グループセレクター -->
  <div id="coach-group-selector"></div>

  <!-- Session × Preset 選択 -->
  <div class="sf-card" style="margin-bottom:16px;">
    <div class="sf-card-title">📅 今日のセッション</div>
    <div class="sf-grid-2" style="gap:12px;">
      <div class="sf-form-row" style="margin:0;">
        <label class="sf-label">セッション</label>
        <div style="display:flex; gap:8px;">
          <select id="cr-session-select" class="sf-input" style="flex:1;" onchange="onCoachSessionChange(this.value)">
            <option value="">— 選択 —</option>
          </select>
          <button type="button" class="sf-btn sf-btn-secondary" style="white-space:nowrap;" onclick="createNewCoachSession()">+ 新規</button>
        </div>
      </div>
      <div class="sf-form-row" style="margin:0;">
        <label class="sf-label">プリセット（任意）</label>
        <select id="cr-preset-select" class="sf-input" onchange="onCoachPresetChange(this.value)">
          <option value="">— 未選択 —</option>
        </select>
      </div>
    </div>
    <div id="cr-session-summary" style="margin-top:8px; font-size:0.85rem; color:rgba(255,255,255,0.7);"></div>
  </div>

  <!-- 提案プリセットバナー（Phase 2） -->
  <div id="cr-preset-banner" class="sf-preset-banner" style="display:none;">
    <span class="sf-preset-banner-icon">💡</span>
    <div id="cr-preset-text">前回の提案を反映しました</div>
  </div>

  <div class="sf-alert sf-alert-blue">
    <span class="sf-alert-icon">ℹ️</span>
    <div>このページはコーチ側の記録用です。選手のVFE記録とは別に、練習の設計情報を保存します。</div>
  </div>

  <div class="sf-grid-2">
    <!-- ══ 左列：メニュー情報 ══ -->
    <div>
      <div class="sf-card">
        <div class="sf-card-title">練習メニュー</div>

        <div class="sf-form-row">
          <label class="sf-label">メニュー名</label>
          <div style="display:flex; gap:8px;">
            <input type="text" id="cr-menu-name" class="sf-input" style="flex:1;"
                   placeholder="例：3v3ポゼッション、ドリブルコース">
            <button class="sf-btn sf-btn-secondary" style="white-space:nowrap;" onclick="openCoachMenuPicker()">選択</button>
          </div>
        </div>

        <div class="sf-form-row">
          <label class="sf-label">目的ドメイン</label>
          <p class="sf-note">何を鍛えるか（1つ選択）</p>
          <div class="sf-chip-group" id="cr-purpose-domain">
            <button class="sf-chip" data-value="感覚" onclick="selectPurposeDomain(this)">感覚</button>
            <button class="sf-chip" data-value="認知" onclick="selectPurposeDomain(this)">認知</button>
            <button class="sf-chip" data-value="相互作用" onclick="selectPurposeDomain(this)">相互作用</button>
            <button class="sf-chip" data-value="長期目標" onclick="selectPurposeDomain(this)">長期目標</button>
          </div>
        </div>

        <div class="sf-form-row">
          <label class="sf-label">目的詳細（任意）</label>
          <input type="text" id="cr-purpose-detail" class="sf-input"
                 placeholder="例: 視覚|空間認知|予測精度（パイプ区切り）">
        </div>

        <div class="sf-form-row">
          <label class="sf-label">練習時間（分）</label>
          <div class="sf-slider-row">
            <input type="range" id="cr-duration" min="5" max="90" value="20" step="5"
                   oninput="this.nextElementSibling.textContent=this.value+'分'">
            <span class="sf-slider-val">20分</span>
          </div>
          <div class="sf-scale-ends"><span>5分</span><span>90分</span></div>
        </div>

        <div class="sf-separator"></div>

        <div class="sf-form-row">
          <label class="sf-label">レイヤー（難易度段階）</label>
          <p class="sf-note">L1=単純反復 → L4=実戦的・複雑</p>
          <div class="sf-radio-group" id="cr-layer">
            <label class="sf-radio"><input type="radio" name="cr-layer" value="L1"> L1 単純</label>
            <label class="sf-radio"><input type="radio" name="cr-layer" value="L2"> L2 応用</label>
            <label class="sf-radio"><input type="radio" name="cr-layer" value="L3"> L3 複合</label>
            <label class="sf-radio"><input type="radio" name="cr-layer" value="L4"> L4 実戦</label>
          </div>
        </div>

        <div class="sf-form-row">
          <label class="sf-label">使用チャネル（複数選択可）</label>
          <div class="sf-chip-group" id="cr-channels">
            <button class="sf-chip" data-value="視覚" onclick="toggleCoachChip(this)">視覚</button>
            <button class="sf-chip" data-value="体性感覚" onclick="toggleCoachChip(this)">体性感覚</button>
            <button class="sf-chip" data-value="呼吸・心拍" onclick="toggleCoachChip(this)">呼吸・心拍</button>
            <button class="sf-chip" data-value="前庭覚" onclick="toggleCoachChip(this)">前庭覚</button>
          </div>
        </div>

        <div class="sf-form-row">
          <label class="sf-label">制約条件（複数選択可）</label>
          <div class="sf-chip-group" id="cr-constraints">
            <button class="sf-chip" data-value="時間制限あり" onclick="toggleCoachChip(this)">時間</button>
            <button class="sf-chip" data-value="人数制限" onclick="toggleCoachChip(this)">人数</button>
            <button class="sf-chip" data-value="スペース制限" onclick="toggleCoachChip(this)">スペース</button>
            <button class="sf-chip" data-value="タッチ制限" onclick="toggleCoachChip(this)">タッチ制限</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ══ 右列：コーチング環境 ══ -->
    <div>
      <div class="sf-card">
        <div class="sf-card-title">
          コーチング環境
          <span class="sf-theory-tag tag-oxytocin">オキシトシン系→λ</span>
        </div>

        <div class="sf-form-row">
          <label class="sf-label">コーチングタイプ</label>
          <p class="sf-note">選手への声かけ・環境設定の方針</p>
          <div class="sf-radio-group sf-radio-cards" id="cr-coaching">
            <label class="sf-radio-card">
              <input type="radio" name="cr-coaching" value="safe">
              <div class="sf-radio-card-content">
                <span class="sf-radio-card-icon">🛡️</span>
                <span class="sf-radio-card-label">安全重視</span>
                <span class="sf-radio-card-desc">失敗OK、安心できる環境</span>
                <span class="sf-radio-card-effect">λ = -2（安定寄り）</span>
              </div>
            </label>
            <label class="sf-radio-card">
              <input type="radio" name="cr-coaching" value="explore">
              <div class="sf-radio-card-content">
                <span class="sf-radio-card-icon">🔍</span>
                <span class="sf-radio-card-label">探索促進</span>
                <span class="sf-radio-card-desc">自由に試行錯誤を奨励</span>
                <span class="sf-radio-card-effect">λ = -1（やや安定）</span>
              </div>
            </label>
            <label class="sf-radio-card">
              <input type="radio" name="cr-coaching" value="positive">
              <div class="sf-radio-card-content">
                <span class="sf-radio-card-icon">👍</span>
                <span class="sf-radio-card-label">ポジティブ</span>
                <span class="sf-radio-card-desc">成功を褒め、前向きに</span>
                <span class="sf-radio-card-effect">λ = 0（中立）</span>
              </div>
            </label>
            <label class="sf-radio-card">
              <input type="radio" name="cr-coaching" value="challenge">
              <div class="sf-radio-card-content">
                <span class="sf-radio-card-icon">🔥</span>
                <span class="sf-radio-card-label">チャレンジ</span>
                <span class="sf-radio-card-desc">高い基準・競争的環境</span>
                <span class="sf-radio-card-effect">λ = +2（変化寄り）</span>
              </div>
            </label>
          </div>
        </div>

        <div class="sf-separator"></div>

        <div class="sf-form-row">
          <label class="sf-label">フィードバック頻度</label>
          <div class="sf-radio-group">
            <label class="sf-radio"><input type="radio" name="cr-feedback" value="none"> なし（自律的）</label>
            <label class="sf-radio"><input type="radio" name="cr-feedback" value="few"> 少なめ（要所のみ）</label>
            <label class="sf-radio"><input type="radio" name="cr-feedback" value="frequent"> 多め（頻繁に声かけ）</label>
          </div>
        </div>

        <div class="sf-separator"></div>

        <div class="sf-form-row">
          <label class="sf-label">コーチメモ</label>
          <textarea id="cr-notes" class="sf-input" rows="3" placeholder="気づいたことを自由に記録..."></textarea>
        </div>
      </div>

      <!-- λ プレビュー -->
      <div class="sf-card sf-preview-card">
        <div class="sf-card-title">📐 λ プレビュー</div>
        <div class="sf-preview-grid">
          <div class="sf-preview-item">
            <div class="sf-preview-label">λ 修飾</div>
            <div class="sf-preview-val" id="cr-pv-lambda">--</div>
            <div class="sf-preview-sub">オキシトシン→社会的調節</div>
          </div>
          <div class="sf-preview-item">
            <div class="sf-preview-label">コーチングタイプ</div>
            <div class="sf-preview-val" id="cr-pv-type" style="font-size:0.9rem;">--</div>
            <div class="sf-preview-sub">選択中</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ボタン -->
  <div class="sf-btn-row">
    <button class="sf-btn sf-btn-primary" onclick="saveCoachRecord()">
      記録を保存
    </button>
  </div>
</div>

<!-- メニューピッカーモーダル -->
<div id="cr-menu-picker-modal" class="sf-modal-overlay" style="display:none;">
  <div class="sf-modal" style="max-width:500px;">
    <div class="sf-modal-header">
      <span>メニュー選択</span>
      <button onclick="closeCoachMenuPicker()" style="background:none;border:none;font-size:1.3rem;cursor:pointer;">×</button>
    </div>
    <div style="padding:16px;">
      <input type="text" id="cr-menu-search" class="sf-input" placeholder="メニュー名で検索..."
             oninput="filterCoachMenuPicker(this.value)">
      <div id="cr-menu-picker-list" style="max-height:300px; overflow-y:auto; margin-top:12px;"></div>
    </div>
  </div>
</div>

<script>
async function initCoachRecordPage() {
  // グループセレクターを描画（変更時に coach_sessions を再ロード）
  await GroupContext.renderGroupSelector('coach-group-selector', () => reloadCoachSessions());

  // Session × Preset 選択を初期化
  await reloadCoachSessions();

  // Inherit menu name from SessionFlow if available
  const state = SessionFlow.getState();
  if (state.record.menuName) {
    document.getElementById('cr-menu-name').value = state.record.menuName;
  }
  if (state.record.coachingType) {
    const radio = document.querySelector(`input[name="cr-coaching"][value="${state.record.coachingType}"]`);
    if (radio) radio.checked = true;
  }
  updateLambdaPreview();

  // Listen for coaching type changes
  document.querySelectorAll('input[name="cr-coaching"]').forEach(r => {
    r.addEventListener('change', updateLambdaPreview);
  });

  // Phase 2: 採用済み提案のプリセット反映
  await applyAcceptedPresets();
}

async function reloadCoachSessions() {
  if (typeof SessionPresets === 'undefined') return;
  const groupId = typeof GroupContext !== 'undefined' ? GroupContext.getActiveGroupId() : null;
  await SessionPresets.loadForGroup(groupId);
  renderSessionPresetSelects();
}

function renderSessionPresetSelects() {
  const sessionSel = document.getElementById('cr-session-select');
  const presetSel = document.getElementById('cr-preset-select');
  if (!sessionSel || !presetSel) return;

  const sessions = SessionPresets.listCoachSessions();
  const presets = SessionPresets.listPresets();
  const currentId = SessionPresets.getCurrentCoachSessionId();

  // 現在選択中が一覧に無ければクリア
  const validCurrent = sessions.some(s => s.id === currentId) ? currentId : null;
  if (validCurrent !== currentId) SessionPresets.setCurrentCoachSessionId(null);

  sessionSel.innerHTML = '<option value="">— 選択 —</option>' + sessions.map(s => {
    const dateTag = s.session_date ? ` (${s.session_date.slice(5)})` : '';
    const label = (s.label || 'Session') + dateTag;
    return `<option value="${s.id}"${s.id === validCurrent ? ' selected' : ''}>${label}</option>`;
  }).join('');

  const current = validCurrent ? SessionPresets.getCoachSessionById(validCurrent) : null;
  const presetId = current && current.preset_id != null ? current.preset_id : null;

  presetSel.innerHTML = '<option value="">— 未選択 —</option>' + presets.map(p =>
    `<option value="${p.id}"${String(p.id) === String(presetId) ? ' selected' : ''}>${p.name}</option>`
  ).join('');

  updateSessionSummary();
}

function updateSessionSummary() {
  const sel = document.getElementById('cr-session-summary');
  if (!sel) return;
  const sid = SessionPresets.getCurrentCoachSessionId();
  const session = sid ? SessionPresets.getCoachSessionById(sid) : null;
  if (!session) {
    sel.textContent = 'セッションを選ぶか「+ 新規」で作成してください';
    return;
  }
  const preset = session.preset_id != null ? SessionPresets.getPresetById(session.preset_id) : null;
  const dateStr = session.session_date || '';
  sel.textContent = `「${session.label || 'Session'}」${dateStr ? `(${dateStr})` : ''}` +
    (preset ? ` × 「${preset.name}」` : '（プリセット未選択）') + ' を記録対象にしています';
}

function onCoachSessionChange(id) {
  SessionPresets.setCurrentCoachSessionId(id || null);
  // preset select を選択中セッションの preset_id に合わせる
  const presetSel = document.getElementById('cr-preset-select');
  const session = id ? SessionPresets.getCoachSessionById(id) : null;
  if (presetSel) presetSel.value = session && session.preset_id != null ? String(session.preset_id) : '';
  updateSessionSummary();
}

async function onCoachPresetChange(pid) {
  const sid = SessionPresets.getCurrentCoachSessionId();
  if (!sid) {
    alert('先にセッションを選択（または作成）してください');
    return;
  }
  await SessionPresets.setPresetForCoachSession(sid, pid === '' ? null : pid);
  updateSessionSummary();
}

async function createNewCoachSession() {
  const groupId = typeof GroupContext !== 'undefined' ? GroupContext.getActiveGroupId() : null;
  if (!groupId) {
    alert('先にグループ（チーム・カテゴリ）を選択してください');
    return;
  }
  const existing = SessionPresets.listCoachSessions();
  const nextNum = existing.length + 1;
  const label = `Session ${nextNum}`;
  const created = await SessionPresets.createCoachSession({ groupId, label });
  if (!created) {
    alert('セッションの作成に失敗しました');
    return;
  }
  SessionPresets.setCurrentCoachSessionId(created.id);
  renderSessionPresetSelects();
}

async function applyAcceptedPresets() {
  const groupId = GroupContext.getActiveGroupId();
  if (!groupId || typeof GroupAnalytics === 'undefined') return;

  try {
    const presets = await GroupAnalytics.fetchAcceptedPresets(groupId);
    if (!presets) return;

    const applied = [];

    // レイヤー自動選択
    if (presets.layer) {
      const radio = document.querySelector(`input[name="cr-layer"][value="${presets.layer}"]`);
      if (radio) {
        radio.checked = true;
        applied.push(`レイヤー: ${presets.layer}`);
      }
    }

    // コーチングタイプ自動選択
    if (presets.coachingType) {
      const radio = document.querySelector(`input[name="cr-coaching"][value="${presets.coachingType}"]`);
      if (radio) {
        radio.checked = true;
        updateLambdaPreview();
        const labels = { safe: '安全重視', explore: '探索促進', positive: 'ポジティブ', challenge: 'チャレンジ' };
        applied.push(`コーチング: ${labels[presets.coachingType] || presets.coachingType}`);
      }
    }

    // 目的ドメイン自動選択（提案 1 件目を単一選択）
    if (presets.purpose && presets.purpose.length > 0) {
      const chips = document.querySelectorAll('#cr-purpose-domain .sf-chip');
      // 提案内の最初に一致するドメイン値を採用
      for (const chip of chips) {
        if (presets.purpose.includes(chip.dataset.value)) {
          chips.forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          applied.push(`目的: ${chip.dataset.value}`);
          break;
        }
      }
    }

    // バナー表示
    if (applied.length > 0) {
      const banner = document.getElementById('cr-preset-banner');
      const text = document.getElementById('cr-preset-text');
      if (banner && text) {
        text.textContent = `前回の提案を反映しました（${applied.join('、')}）`;
        banner.style.display = 'flex';
      }
    }
  } catch (err) {
    console.error('applyAcceptedPresets:', err);
  }
}

function toggleCoachChip(btn) {
  btn.classList.toggle('active');
}

// 目的ドメインは単一選択（チップ1つだけ active）
function selectPurposeDomain(btn) {
  const group = btn.parentElement;
  if (!group) return;
  const wasActive = btn.classList.contains('active');
  group.querySelectorAll('.sf-chip').forEach(c => c.classList.remove('active'));
  if (!wasActive) btn.classList.add('active');  // トグル解除も可能
}

function getPurposeDomain() {
  const btn = document.querySelector('#cr-purpose-domain .sf-chip.active');
  return btn ? btn.dataset.value : '';
}

function getPurposeDetail() {
  const el = document.getElementById('cr-purpose-detail');
  return el ? el.value.trim() : '';
}

function getCoachChips(groupId) {
  const group = document.getElementById(groupId);
  if (!group) return [];
  return Array.from(group.querySelectorAll('.sf-chip.active')).map(c => c.dataset.value);
}

function updateLambdaPreview() {
  const coachingType = document.querySelector('input[name="cr-coaching"]:checked')?.value || '';
  const lambdaEl = document.getElementById('cr-pv-lambda');
  const typeEl = document.getElementById('cr-pv-type');

  if (coachingType && typeof FepCalc !== 'undefined') {
    const lambda = FepCalc.oxytocinToLambda(coachingType);
    if (lambdaEl) {
      lambdaEl.textContent = (lambda >= 0 ? '+' : '') + lambda.toFixed(1);
      lambdaEl.className = 'sf-preview-val ' + (Math.abs(lambda) <= 1 ? 'val-good' : 'val-warn');
    }
    const labels = { safe: '安全重視', explore: '探索促進', positive: 'ポジティブ', challenge: 'チャレンジ' };
    if (typeEl) typeEl.textContent = labels[coachingType] || coachingType;
  } else {
    if (lambdaEl) { lambdaEl.textContent = '--'; lambdaEl.className = 'sf-preview-val'; }
    if (typeEl) typeEl.textContent = '--';
  }
}

async function saveCoachRecord() {
  const menuName = document.getElementById('cr-menu-name')?.value?.trim();
  if (!menuName) {
    alert('メニュー名を入力してください。');
    document.getElementById('cr-menu-name')?.focus();
    return;
  }

  const purposeDomain = getPurposeDomain();
  const purposeDetail = getPurposeDetail();
  const record = {
    date: new Date().toISOString().slice(0, 10),
    menuName,
    // DB の purpose TEXT[] 列に合わせ、ドメインを配列1件で送る
    purpose: purposeDomain ? [purposeDomain] : [],
    purpose_domain: purposeDomain,
    purpose_detail: purposeDetail,
    duration: parseInt(document.getElementById('cr-duration')?.value ?? 20),
    layer: document.querySelector('input[name="cr-layer"]:checked')?.value || '',
    channels: getCoachChips('cr-channels'),
    constraints: getCoachChips('cr-constraints'),
    coachingType: document.querySelector('input[name="cr-coaching"]:checked')?.value || '',
    feedbackFreq: document.querySelector('input[name="cr-feedback"]:checked')?.value || '',
    notes: document.getElementById('cr-notes')?.value || '',
    savedAt: new Date().toISOString(),
  };

  // Supabase に保存（FEP Soccer Training）
  const ok = await persistCoachRecord(record);

  if (ok) {
    alert('コーチ記録を保存しました。');
  } else {
    alert('保存に失敗しました。ネットワークを確認してください。');
  }

  showPage('home', document.querySelector('.sidebar-nav-btn[data-page="home"]'));
}

// ── メニューピッカー ──
function openCoachMenuPicker() {
  document.getElementById('cr-menu-picker-modal').style.display = 'flex';
  populateCoachMenuPicker();
}
function closeCoachMenuPicker() {
  document.getElementById('cr-menu-picker-modal').style.display = 'none';
}
function populateCoachMenuPicker() {
  const list = document.getElementById('cr-menu-picker-list');
  if (!list) return;
  let menus = [];
  if (typeof ALL_MENU_PRESETS !== 'undefined') {
    menus = ALL_MENU_PRESETS.filter(m => (m.target_scope || m.scope) === 'team');
  }
  renderCoachPickerList(list, menus);
}
function filterCoachMenuPicker(query) {
  const list = document.getElementById('cr-menu-picker-list');
  if (!list) return;
  let menus = [];
  if (typeof ALL_MENU_PRESETS !== 'undefined') {
    menus = ALL_MENU_PRESETS.filter(m => (m.target_scope || m.scope) === 'team');
  }
  if (query.trim()) {
    const q = query.trim().toLowerCase();
    menus = menus.filter(m => (m.menu_name || m.name || '').toLowerCase().includes(q));
  }
  renderCoachPickerList(list, menus);
}
function renderCoachPickerList(container, menus) {
  if (menus.length === 0) {
    container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);">メニューが見つかりません</div>';
    return;
  }
  const labels = window.MENU_LABELS || {};
  const statusStyle = {
    draft:     { bg: '#e5e7eb', color: '#555' },
    tested:    { bg: '#dbeafe', color: '#1e40af' },
    validated: { bg: '#dcfce7', color: '#166534' },
  };

  container.innerHTML = menus.map(m => {
    const status = m.menu_status || 'draft';
    const st = statusStyle[status] || statusStyle.draft;
    const statusLabel = (labels.menu_status && labels.menu_status[status]) || status;
    const vfe = (labels.vfe_target && labels.vfe_target[m.vfe_target]) || '';
    const phase = m.session_phase || '';
    const grade = m.category || '';
    const meta = [m.layer, phase, grade].filter(Boolean).join(' · ');
    return `
      <div style="padding:10px 12px; border-bottom:1px solid var(--border); cursor:pointer;"
           onclick="selectCoachMenu('${m.menu_name.replace(/'/g, "\\'")}', '${m.layer || ''}', '${phase}')">
        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
          <span style="font-weight:600;">${m.menu_name}</span>
          <span style="background:${st.bg}; color:${st.color}; border-radius:4px; padding:1px 6px; font-size:0.72rem;">${statusLabel}</span>
          ${vfe ? `<span style="color:var(--text-muted); font-size:0.72rem;">VFE: ${vfe}</span>` : ''}
        </div>
        <div style="font-size:0.78rem; color:var(--text-muted); margin-top:2px;">${meta}</div>
        ${m.desc ? `<div style="font-size:0.75rem; color:var(--text-muted); margin-top:2px; line-height:1.4;">${m.desc}</div>` : ''}
      </div>
    `;
  }).join('');
}
function selectCoachMenu(name, layer, category) {
  document.getElementById('cr-menu-name').value = name;
  if (layer) {
    const radio = document.querySelector(`input[name="cr-layer"][value="${layer}"]`);
    if (radio) radio.checked = true;
  }
  closeCoachMenuPicker();
}

initCoachRecordPage();
</script>

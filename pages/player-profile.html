<!-- ══════════════════════════════════════════════════════════
     PLAYER PROFILE — 選手プロフィール
     チーム別選手管理 + エラータイプ分類 + トレーニング提案
═══════════════════════════════════════════════════════════ -->

<div class="sf-page">
  <div class="sf-header">
    <div class="sf-page-title">👤 選手プロフィール</div>
    <p class="sf-page-sub">チーム別の選手一覧・タイプ分類・推奨トレーニングを管理します</p>
  </div>

  <!-- ═══ チーム一覧 ═══ -->
  <div class="sf-card">
    <div class="sf-card-title">🏟️ チーム一覧</div>
    <div id="pp-team-list">
      <div style="text-align:center; padding:20px; color:var(--text-muted);">読み込み中...</div>
    </div>
  </div>

  <!-- ═══ 選手ロスター（チーム選択後に表示）═══ -->
  <div id="pp-roster" style="display:none;">
    <div class="sf-card" style="border-left:4px solid #2563eb;">
      <div class="sf-card-title">📋 <span id="pp-roster-team-name">--</span> の選手</div>
      <div id="pp-roster-list"></div>
    </div>
  </div>

  <!-- ═══ 選手詳細（選手選択後に表示）═══ -->
  <div id="pp-detail" style="display:none;"></div>
</div>

<!-- ═══ 選手追加・編集モーダル ═══ -->
<div id="pp-player-modal" class="sf-modal-overlay" style="display:none;">
  <div class="sf-modal" style="max-width:460px;">
    <div class="sf-modal-header">
      <span id="pp-modal-title">選手を追加</span>
      <button onclick="closePlayerModal()" style="background:none;border:none;font-size:1.3rem;cursor:pointer;">×</button>
    </div>
    <div style="padding:16px;">
      <input type="hidden" id="pp-modal-player-id">
      <div class="sf-form-row">
        <label class="sf-label">チーム名</label>
        <input type="text" id="pp-modal-team" class="sf-input" placeholder="例：FC Active U-12">
      </div>
      <div class="sf-form-row">
        <label class="sf-label">選手名</label>
        <input type="text" id="pp-modal-name" class="sf-input" placeholder="例：田中太郎">
      </div>
      <div class="sf-form-row" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div>
          <label class="sf-label">背番号</label>
          <input type="text" id="pp-modal-jersey" class="sf-input" placeholder="例：10">
        </div>
        <div>
          <label class="sf-label">ポジション</label>
          <select id="pp-modal-position" class="sf-input">
            <option value="GK">GK</option>
            <option value="DF">DF</option>
            <option value="MF" selected>MF</option>
            <option value="FW">FW</option>
          </select>
        </div>
      </div>
      <div class="sf-form-row">
        <label class="sf-label">エラータイプ分類</label>
        <select id="pp-modal-error-type" class="sf-input">
          <option value="unclassified">❓ 未分類</option>
          <option value="reaction_delay">⏱️ 反応遅れ型（IND-001）</option>
          <option value="information_overload">🌀 情報混乱型（IND-002）</option>
          <option value="correction_confusion">🔄 修正迷子型（IND-003）</option>
          <option value="change_freeze">🧊 変化フリーズ型（IND-004）</option>
          <option value="emotional_drag">💔 感情引きずり型（IND-005）</option>
        </select>
      </div>
      <div style="text-align:right; margin-top:14px;">
        <button class="sf-btn sf-btn-primary" onclick="savePlayerFromModal()">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- JS is in js/player-profile.js, initialized via core.js -->

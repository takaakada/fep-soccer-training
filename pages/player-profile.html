<!-- ══════════════════════════════════════════════════════════
     PLAYER PROFILE — 選手プロフィール
     個人評価履歴・VFE推移・選手カルテ
═══════════════════════════════════════════════════════════ -->

<div class="sf-page">
  <div class="sf-header">
    <div class="sf-page-title">📊 選手プロフィール</div>
    <p class="sf-page-sub">個人の評価履歴とVFE推移を確認します</p>
  </div>

  <!-- 選手選択 -->
  <div class="sf-card" style="padding:12px 16px;">
    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <label class="sf-label" style="margin:0; min-width:auto;">選手：</label>
      <select id="pp-player-select" class="sf-input" style="flex:1; min-width:180px; max-width:300px;" onchange="onProfilePlayerSelect()">
        <option value="">-- 選手を選択 --</option>
      </select>
    </div>
  </div>

  <!-- 選手未選択時 -->
  <div id="pp-empty" style="text-align:center; padding:60px 20px; color:var(--text-muted);">
    <div style="font-size:2.5rem; margin-bottom:12px;">📊</div>
    <p style="font-size:1rem;">選手を選択してプロフィールを表示します</p>
    <p style="font-size:0.85rem; margin-top:8px;">
      <a href="#" onclick="showPage('individual', document.querySelector('.sidebar-nav-btn[data-page=individual]'))">個別トレーニングページ</a>で選手を登録できます
    </p>
  </div>

  <!-- プロフィールコンテンツ -->
  <div id="pp-content" style="display:none;">
    <!-- 選手カード -->
    <div class="sf-card" style="border-left:4px solid #2563eb;">
      <div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
        <div style="width:60px; height:60px; background:linear-gradient(135deg, #2563eb, #7c3aed); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.8rem; color:white;">🧑</div>
        <div style="flex:1;">
          <div id="pp-name" style="font-size:1.3rem; font-weight:800;">--</div>
          <div id="pp-position" style="font-size:0.9rem; color:var(--text-muted);">--</div>
          <div id="pp-notes" style="font-size:0.82rem; color:var(--text-muted); margin-top:4px;">--</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:0.75rem; color:var(--text-muted);">記録数</div>
          <div id="pp-record-count" style="font-size:1.5rem; font-weight:800; color:#2563eb;">0</div>
        </div>
      </div>
    </div>

    <div class="sf-grid-2">
      <!-- ══ 左列：最新スコア + 統計 ══ -->
      <div>
        <!-- 最新VFEスコア -->
        <div class="sf-card sf-preview-card">
          <div class="sf-card-title">🎯 最新スコア</div>
          <div class="sf-preview-grid" style="grid-template-columns:repeat(3,1fr);">
            <div class="sf-preview-item">
              <div class="sf-preview-label">VFE</div>
              <div class="sf-preview-val" id="pp-latest-vfe">--</div>
              <div class="sf-preview-sub">最新</div>
            </div>
            <div class="sf-preview-item">
              <div class="sf-preview-label">F'概算</div>
              <div class="sf-preview-val" id="pp-latest-fprime">--</div>
              <div class="sf-preview-sub">dr/uh/fh</div>
            </div>
            <div class="sf-preview-item">
              <div class="sf-preview-label">平均VFE</div>
              <div class="sf-preview-val" id="pp-avg-vfe">--</div>
              <div class="sf-preview-sub">全期間</div>
            </div>
          </div>
        </div>

        <!-- VFE統計 -->
        <div class="sf-card">
          <div class="sf-card-title">📈 VFE 統計</div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div style="padding:10px; background:var(--bg); border-radius:8px; text-align:center;">
              <div style="font-size:0.75rem; color:var(--text-muted);">最小VFE</div>
              <div id="pp-min-vfe" style="font-size:1.2rem; font-weight:700; color:#059669;">--</div>
            </div>
            <div style="padding:10px; background:var(--bg); border-radius:8px; text-align:center;">
              <div style="font-size:0.75rem; color:var(--text-muted);">最大VFE</div>
              <div id="pp-max-vfe" style="font-size:1.2rem; font-weight:700; color:#dc2626;">--</div>
            </div>
            <div style="padding:10px; background:var(--bg); border-radius:8px; text-align:center;">
              <div style="font-size:0.75rem; color:var(--text-muted);">安定ゾーン率</div>
              <div id="pp-stable-rate" style="font-size:1.2rem; font-weight:700; color:#2563eb;">--</div>
            </div>
            <div style="padding:10px; background:var(--bg); border-radius:8px; text-align:center;">
              <div style="font-size:0.75rem; color:var(--text-muted);">トレンド</div>
              <div id="pp-trend" style="font-size:1.2rem; font-weight:700;">--</div>
            </div>
          </div>
        </div>
      </div>

      <!-- ══ 右列：VFE推移チャート ══ -->
      <div>
        <div class="sf-card">
          <div class="sf-card-title">📊 VFE 推移</div>
          <div id="pp-vfe-chart" style="display:flex; align-items:flex-end; gap:4px; height:140px; padding:8px 0;">
            <div style="text-align:center; width:100%; color:var(--text-muted); font-size:0.85rem;">記録データなし</div>
          </div>
        </div>

        <!-- F'推移 -->
        <div class="sf-card">
          <div class="sf-card-title">🧠 F' 推移（dr/uh/fh）</div>
          <div id="pp-fprime-chart" style="display:flex; align-items:flex-end; gap:4px; height:100px; padding:8px 0;">
            <div style="text-align:center; width:100%; color:var(--text-muted); font-size:0.85rem;">記録データなし</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 記録一覧 -->
    <div class="sf-card">
      <div class="sf-card-title">📋 記録一覧</div>
      <div id="pp-record-list" style="max-height:400px; overflow-y:auto;">
        <div style="text-align:center; padding:20px; color:var(--text-muted); font-size:0.88rem;">記録データなし</div>
      </div>
    </div>
  </div>
</div>

<script>
let _profilePlayerId = '';

function initPlayerProfilePage() {
  loadProfilePlayerList();
}

function loadProfilePlayerList() {
  const select = document.getElementById('pp-player-select');
  if (!select) return;
  let players = [];
  try { players = JSON.parse(localStorage.getItem('fep_players') || '[]'); } catch(e) {}

  select.innerHTML = '<option value="">-- 選手を選択 --</option>';
  players.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = `${p.name}（${p.position}）`;
    select.appendChild(opt);
  });
}

function onProfilePlayerSelect() {
  const select = document.getElementById('pp-player-select');
  _profilePlayerId = select?.value || '';

  if (!_profilePlayerId) {
    document.getElementById('pp-empty').style.display = 'block';
    document.getElementById('pp-content').style.display = 'none';
    return;
  }

  document.getElementById('pp-empty').style.display = 'none';
  document.getElementById('pp-content').style.display = 'block';

  let players = [];
  try { players = JSON.parse(localStorage.getItem('fep_players') || '[]'); } catch(e) {}
  const player = players.find(p => p.id === _profilePlayerId);

  if (player) {
    document.getElementById('pp-name').textContent = player.name;
    document.getElementById('pp-position').textContent = `ポジション: ${player.position}`;
    document.getElementById('pp-notes').textContent = player.notes || '特記事項なし';
  }

  // Get records for this player
  const records = getPlayerRecords(player?.name || '');
  renderProfileData(records);
}

function getPlayerRecords(playerName) {
  if (!playerName) return [];
  let allRecords = [];
  try { allRecords = JSON.parse(localStorage.getItem('fep_individual_records') || '[]'); } catch(e) {}
  return allRecords.filter(r => r.playerName === playerName);
}

function renderProfileData(records) {
  // Record count
  document.getElementById('pp-record-count').textContent = records.length;

  if (records.length === 0) {
    document.getElementById('pp-latest-vfe').textContent = '--';
    document.getElementById('pp-latest-fprime').textContent = '--';
    document.getElementById('pp-avg-vfe').textContent = '--';
    document.getElementById('pp-min-vfe').textContent = '--';
    document.getElementById('pp-max-vfe').textContent = '--';
    document.getElementById('pp-stable-rate').textContent = '--';
    document.getElementById('pp-trend').textContent = '--';
    document.getElementById('pp-vfe-chart').innerHTML = '<div style="text-align:center; width:100%; color:var(--text-muted); font-size:0.85rem;">記録データなし</div>';
    document.getElementById('pp-fprime-chart').innerHTML = '<div style="text-align:center; width:100%; color:var(--text-muted); font-size:0.85rem;">記録データなし</div>';
    document.getElementById('pp-record-list').innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-muted);">記録データなし</div>';
    return;
  }

  // Latest scores
  const latest = records[0];
  if (latest.vfe_display != null) {
    const el = document.getElementById('pp-latest-vfe');
    el.textContent = latest.vfe_display.toFixed(1);
    el.className = 'sf-preview-val ' + (latest.vfe_display < 40 ? 'val-good' : latest.vfe_display < 60 ? '' : 'val-warn');
  }

  // F' estimate from dr/uh/fh
  if (latest.dr != null) {
    const fp = ((latest.dr - 5) / 2.5 + (latest.uh - 5) / 2.5 + (latest.fh - 5) / 2.5) / 3;
    const el = document.getElementById('pp-latest-fprime');
    el.textContent = fp.toFixed(2);
    el.className = 'sf-preview-val ' + (fp > 0.3 ? 'val-good' : fp < -0.3 ? 'val-warn' : '');
  }

  // Statistics
  const vfeValues = records.filter(r => r.vfe_display != null).map(r => r.vfe_display);
  if (vfeValues.length > 0) {
    const avg = vfeValues.reduce((a, b) => a + b, 0) / vfeValues.length;
    document.getElementById('pp-avg-vfe').textContent = avg.toFixed(1);
    document.getElementById('pp-min-vfe').textContent = Math.min(...vfeValues).toFixed(1);
    document.getElementById('pp-max-vfe').textContent = Math.max(...vfeValues).toFixed(1);

    const stableCount = vfeValues.filter(v => v >= 25 && v <= 55).length;
    document.getElementById('pp-stable-rate').textContent = Math.round(stableCount / vfeValues.length * 100) + '%';

    // Trend (compare recent 3 vs previous 3)
    if (vfeValues.length >= 4) {
      const recent = vfeValues.slice(0, 3).reduce((a, b) => a + b, 0) / 3;
      const older = vfeValues.slice(3, 6).reduce((a, b) => a + b, 0) / Math.min(3, vfeValues.length - 3);
      const diff = recent - older;
      const trendEl = document.getElementById('pp-trend');
      if (diff < -5) { trendEl.textContent = '↓ 改善'; trendEl.style.color = '#059669'; }
      else if (diff > 5) { trendEl.textContent = '↑ 上昇'; trendEl.style.color = '#dc2626'; }
      else { trendEl.textContent = '→ 安定'; trendEl.style.color = '#2563eb'; }
    } else {
      document.getElementById('pp-trend').textContent = 'データ不足';
    }
  }

  // VFE Chart
  renderProfileVfeChart(records);

  // F' Chart
  renderProfileFPrimeChart(records);

  // Record list
  renderProfileRecordList(records);
}

function renderProfileVfeChart(records) {
  const container = document.getElementById('pp-vfe-chart');
  if (!container) return;

  const withVfe = records.filter(r => r.vfe_display != null).slice(0, 20).reverse();
  if (withVfe.length === 0) {
    container.innerHTML = '<div style="text-align:center; width:100%; color:var(--text-muted);">データなし</div>';
    return;
  }

  container.innerHTML = withVfe.map(r => {
    const h = Math.max(4, (r.vfe_display / 100) * 120);
    const color = r.vfe_display < 30 ? '#059669' : r.vfe_display < 60 ? '#d97706' : '#dc2626';
    return `
      <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;">
        <div style="font-size:0.6rem; color:var(--text-muted);">${r.vfe_display.toFixed(0)}</div>
        <div style="width:100%; max-width:20px; height:${h}px; background:${color}; border-radius:3px 3px 0 0;"></div>
        <div style="font-size:0.55rem; color:var(--text-muted);">${(r.date || '').slice(5)}</div>
      </div>
    `;
  }).join('');
}

function renderProfileFPrimeChart(records) {
  const container = document.getElementById('pp-fprime-chart');
  if (!container) return;

  const withFP = records.filter(r => r.dr != null).slice(0, 20).reverse();
  if (withFP.length === 0) {
    container.innerHTML = '<div style="text-align:center; width:100%; color:var(--text-muted);">データなし</div>';
    return;
  }

  container.innerHTML = withFP.map(r => {
    const fp = ((r.dr - 5) / 2.5 + (r.uh - 5) / 2.5 + (r.fh - 5) / 2.5) / 3;
    const normalized = (fp + 2) / 4; // -2..+2 → 0..1
    const h = Math.max(4, normalized * 80);
    const color = fp > 0.3 ? '#059669' : fp < -0.3 ? '#dc2626' : '#d97706';
    return `
      <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;">
        <div style="font-size:0.6rem; color:var(--text-muted);">${fp.toFixed(1)}</div>
        <div style="width:100%; max-width:20px; height:${h}px; background:${color}; border-radius:3px 3px 0 0;"></div>
        <div style="font-size:0.55rem; color:var(--text-muted);">${(r.date || '').slice(5)}</div>
      </div>
    `;
  }).join('');
}

function renderProfileRecordList(records) {
  const container = document.getElementById('pp-record-list');
  if (!container) return;

  container.innerHTML = records.map((r, i) => {
    const vfeColor = r.vfe_display != null
      ? (r.vfe_display < 40 ? '#059669' : r.vfe_display < 60 ? '#d97706' : '#dc2626')
      : '#888';
    const fp = r.dr != null ? ((r.dr - 5) / 2.5 + (r.uh - 5) / 2.5 + (r.fh - 5) / 2.5) / 3 : null;

    return `
      <div style="display:flex; align-items:center; gap:12px; padding:10px 12px; border-bottom:1px solid var(--border); ${i === 0 ? 'background:#f0fdf4;' : ''}">
        <div style="font-size:0.82rem; color:var(--text-muted); min-width:80px;">${r.date || '--'}</div>
        <div style="font-size:1.05rem; font-weight:800; color:${vfeColor}; min-width:50px;">
          ${r.vfe_display != null ? r.vfe_display.toFixed(1) : '--'}
        </div>
        <div style="font-size:0.78rem; color:var(--text-muted); flex:1;">
          ${r.menuName || ''} ${fp != null ? `| F'=${fp.toFixed(2)}` : ''}
        </div>
        ${i === 0 ? '<span style="font-size:0.72rem; background:#059669; color:white; padding:2px 8px; border-radius:99px; font-weight:700;">最新</span>' : ''}
      </div>
    `;
  }).join('');
}

initPlayerProfilePage();
</script>

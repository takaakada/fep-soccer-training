<div id="pos-page-wrapper">

  <!-- ── Hero ── -->
  <div class="sf-page-hero sf-hero-gk">
    <img src="statics/GK.png" alt="ポジション別メニュー" class="sf-hero-img">
    <div class="sf-hero-overlay">
      <div class="sf-hero-eyebrow">POSITION · DRILL</div>
      <h1 class="sf-hero-title">🧤 ポジション別メニュー</h1>
      <p class="sf-hero-sub">ポジション特化ドリルを確認・編集</p>
    </div>
    <button class="sf-hero-action pos-edit-btn" onclick="togglePosEditMode()" id="pos-edit-btn">✏️ 編集</button>
  </div>

  <!-- ── グループセレクター ── -->
  <div id="pos-group-selector"></div>

  <!-- ── グループ未選択メッセージ ── -->
  <div id="pos-no-group" style="display:none;">
    <div class="sf-card" style="text-align:center; padding:40px 20px;">
      <div style="font-size:2rem; margin-bottom:12px;">👥</div>
      <div style="font-size:1.1rem; font-weight:700; margin-bottom:8px;">グループを選択してください</div>
      <div style="font-size:0.88rem; color:var(--text-muted);">チーム・カテゴリを選択すると、ポジション別メニューが表示されます</div>
    </div>
  </div>

  <div class="pos-tabs" id="pos-tabs">
    <button class="pos-tab-btn active" onclick="switchPosTab('gk', this)">
      <span class="pos-icon">🧤</span>GK
    </button>
    <button class="pos-tab-btn" onclick="switchPosTab('df', this)">
      <span class="pos-icon">🛡️</span>DF
    </button>
    <button class="pos-tab-btn" onclick="switchPosTab('mf', this)">
      <span class="pos-icon">⚙️</span>MF
    </button>
    <button class="pos-tab-btn" onclick="switchPosTab('fw', this)">
      <span class="pos-icon">🎯</span>FW
    </button>
  </div>

  <!-- ── Filter Bar ── -->
  <div id="pos-filter-bar" class="pos-filter-bar">
    <div class="filter-group">
      <label>レイヤー</label>
      <div class="filter-chips" id="pos-filter-layer">
        <button class="filter-chip active" data-val="all" onclick="setPosFilter('layer','all',this)">全て</button>
        <button class="filter-chip" data-val="L1" onclick="setPosFilter('layer','L1',this)">L1</button>
        <button class="filter-chip" data-val="L2" onclick="setPosFilter('layer','L2',this)">L2</button>
        <button class="filter-chip" data-val="L3" onclick="setPosFilter('layer','L3',this)">L3</button>
        <button class="filter-chip" data-val="L4" onclick="setPosFilter('layer','L4',this)">L4</button>
      </div>
    </div>
    <div class="filter-group">
      <label>目的</label>
      <div class="filter-chips" id="pos-filter-purpose">
        <button class="filter-chip active" data-val="all" onclick="setPosFilter('purpose','all',this)">全て</button>
        <button class="filter-chip" data-val="安定化" onclick="setPosFilter('purpose','安定化',this)">安定化</button>
        <button class="filter-chip" data-val="探索" onclick="setPosFilter('purpose','探索',this)">探索</button>
        <button class="filter-chip" data-val="修正" onclick="setPosFilter('purpose','修正',this)">修正</button>
        <button class="filter-chip" data-val="強化" onclick="setPosFilter('purpose','強化',this)">強化</button>
        <button class="filter-chip" data-val="統合" onclick="setPosFilter('purpose','統合',this)">統合</button>
      </div>
    </div>
  </div>

  <!-- ── Position Content (rendered by JS) ── -->
  <div id="pos-gk" class="pos-content active"></div>
  <div id="pos-df" class="pos-content"></div>
  <div id="pos-mf" class="pos-content"></div>
  <div id="pos-fw" class="pos-content"></div>

</div><!-- /#pos-page-wrapper -->

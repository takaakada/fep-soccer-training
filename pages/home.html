<div class="home-page-wrap">
  <div class="hero">
    <img src="statics/fep_training_soccer_logo.png" alt="FEP Soccer Training Logo" class="hero-logo">
    <div class="hero-badge">ACTIVE TRAINING × FOOTBALL</div>
    <h1>上手さの本質を考える</h1>
    <p>脳科学をベースに設計した<br>トレーニングプログラム</p>
    <div class="hero-qr">
      <img src="statics/QRcode.png" alt="QRコード">
      <span>このページをシェア</span>
    </div>
  </div>

  <!-- コーチ用グループセレクター -->
  <div id="home-group-selector" style="width:100%; max-width:500px; margin:24px auto 0; padding:0 16px; box-sizing:border-box;"></div>

  <!-- コーチ用ナビゲーション（入力動線） -->
  <div id="home-coach-nav" style="width:100%; max-width:500px; margin:16px auto 0; padding:0 16px; box-sizing:border-box; display:none;"></div>

  <!-- 選手用ナビゲーション（入力動線） -->
  <div id="home-player-nav" style="width:100%; max-width:500px; margin:16px auto 0; padding:0 16px; box-sizing:border-box; display:none;"></div>

  <!-- 選手用ナビゲーション（入力動線） -->
  <div id="home-player-nav" style="max-width:500px; margin:16px auto 0; padding:0 16px; display:none;"></div>

  <!-- EFE 月次誘導バッジ（選手向け） -->
  <div id="home-efe-badge" style="width:100%; max-width:500px; margin:16px auto 0; padding:0 16px; box-sizing:border-box; display:none;"></div>

  <!-- アカウント切り替え導線 -->
  <div id="home-switch-banner" style="width:100%; max-width:500px; margin:24px auto 0; padding:0 16px; box-sizing:border-box;"></div>
</div>

<script>
(function initHomePage() {
  // コーチ用グループセレクター
  if (currentRole === 'coach' && typeof GroupContext !== 'undefined') {
    GroupContext.renderGroupSelector('home-group-selector');
  }

  // 選手用ナビゲーション（入力動線）
  if (currentRole === 'player') {
    const pNavEl = document.getElementById('home-player-nav');
    if (pNavEl) {
      pNavEl.style.display = 'block';
      pNavEl.innerHTML = `
        <div class="home-coach-nav-card">
          <div class="home-coach-nav-title">📝 今日のチェックイン</div>
          <div class="home-coach-nav-grid">
            <button class="home-coach-nav-btn" onclick="showPage('session-pre-check', document.querySelector('.sidebar-nav-btn[data-page=\\'session-pre-check\\']'))">
              <span class="home-coach-nav-icon">📋</span>
              <span class="home-coach-nav-label">MTG後</span>
            </button>
            <button class="home-coach-nav-btn" onclick="showPage('session-record', document.querySelector('.sidebar-nav-btn[data-page=\\'session-record\\']'))">
              <span class="home-coach-nav-icon">▶️</span>
              <span class="home-coach-nav-label">練習後</span>
            </button>
            <button class="home-coach-nav-btn" onclick="showPage('session-followup', document.querySelector('.sidebar-nav-btn[data-page=\\'session-followup\\']'))">
              <span class="home-coach-nav-icon">🔁</span>
              <span class="home-coach-nav-label">振り返り</span>
            </button>
            <button class="home-coach-nav-btn" onclick="showPage('session-result', document.querySelector('.sidebar-nav-btn[data-page=\\'session-result\\']'))">
              <span class="home-coach-nav-icon">📅</span>
              <span class="home-coach-nav-label">過去の記録</span>
            </button>
          </div>
        </div>`;
    }
  }

  // コーチ用ナビゲーション（入力動線）
  if (currentRole === 'coach') {
    const navEl = document.getElementById('home-coach-nav');
    if (navEl) {
      navEl.style.display = 'block';
      navEl.innerHTML = `
        <div class="home-coach-nav-card">
          <div class="home-coach-nav-title">📋 今日のセッション</div>
          <div class="home-coach-nav-grid">
            <button class="home-coach-nav-btn" onclick="showPage('menu', document.querySelector('.sidebar-nav-btn[data-page=\\'menu\\']'))">
              <span class="home-coach-nav-icon">🏟️</span>
              <span class="home-coach-nav-label">全体</span>
            </button>
            <button class="home-coach-nav-btn" onclick="showPage('position', document.querySelector('.sidebar-nav-btn[data-page=\\'position\\']'))">
              <span class="home-coach-nav-icon">🧤</span>
              <span class="home-coach-nav-label">ポジション別</span>
            </button>
            <button class="home-coach-nav-btn" onclick="showPage('individual', document.querySelector('.sidebar-nav-btn[data-page=\\'individual\\']'))">
              <span class="home-coach-nav-icon">🏃</span>
              <span class="home-coach-nav-label">個別</span>
            </button>
            <button class="home-coach-nav-btn" onclick="showPage('session-coach-record', document.querySelector('.sidebar-nav-btn[data-page=\\'session-coach-record\\']'))">
              <span class="home-coach-nav-icon">📝</span>
              <span class="home-coach-nav-label">コーチ記録</span>
            </button>
          </div>
          <div class="home-coach-nav-divider"></div>
          <div class="home-coach-nav-grid">
            <button class="home-coach-nav-btn" onclick="showPage('session-result', document.querySelector('.sidebar-nav-btn[data-page=\\'session-result\\']'))">
              <span class="home-coach-nav-icon">📊</span>
              <span class="home-coach-nav-label">結果を見る</span>
            </button>
            <button class="home-coach-nav-btn" onclick="showPage('player-profile', document.querySelector('.sidebar-nav-btn[data-page=\\'player-profile\\']'))">
              <span class="home-coach-nav-icon">👥</span>
              <span class="home-coach-nav-label">選手リスト</span>
            </button>
          </div>
        </div>`;
    }
  }

  // EFE 月次誘導バッジ（選手のみ）
  if (currentRole === 'player') {
    const efeEl = document.getElementById('home-efe-badge');
    if (efeEl) {
      const lastRaw = localStorage.getItem('fep_efe_last_' + (currentPlayer && currentPlayer.id));
      const lastDate = lastRaw ? new Date(lastRaw) : null;
      const days = lastDate ? Math.floor((Date.now() - lastDate.getTime()) / 86400000) : null;
      const overdue = days == null || days >= 30;
      const label = days == null
        ? 'まだEFEの記録がありません'
        : `前回のEFEから ${days} 日経過`;
      const hint = overdue
        ? '月に一度、感覚のブレを記録しておきましょう'
        : 'VFEやミーティング後の評価が安定しない時にも活用できます';
      efeEl.style.display = 'block';
      efeEl.innerHTML = `
        <div style="background:${overdue ? 'rgba(245,158,11,0.18)' : 'rgba(255,255,255,0.08)'};
                    border:1px solid ${overdue ? 'rgba(245,158,11,0.55)' : 'rgba(255,255,255,0.15)'};
                    border-radius:12px; padding:14px 16px; display:flex; align-items:center; gap:12px;">
          <div style="font-size:1.5rem;">📅</div>
          <div style="flex:1;">
            <div style="font-weight:700; color:white; font-size:0.95rem;">${label}</div>
            <div style="font-size:0.78rem; color:rgba(255,255,255,0.65); margin-top:2px;">${hint}</div>
          </div>
          <button onclick="showPage('session-efe', null)"
                  style="background:${overdue ? '#f59e0b' : '#2563eb'}; color:white; border:none; border-radius:8px; padding:8px 14px; font-size:0.85rem; font-weight:600; cursor:pointer;">
            記録する
          </button>
        </div>`;
    }
  }

  // アカウント切り替えバナー
  const el = document.getElementById('home-switch-banner');
  if (!el) return;

  if (currentRole === 'player') {
    el.innerHTML = `
      <div style="background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:12px; padding:16px; text-align:center;">
        <div style="font-size:0.85rem; color:rgba(255,255,255,0.6); margin-bottom:8px;">コーチとして記録・管理を行う場合</div>
        <button onclick="switchAccount()" style="background:#2563eb; color:white; border:none; border-radius:8px; padding:10px 24px; font-size:0.9rem; font-weight:600; cursor:pointer;">
          🔄 コーチ用メニューへ切り替え
        </button>
      </div>`;
  } else if (currentRole === 'coach') {
    el.innerHTML = `
      <div style="background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:12px; padding:16px; text-align:center;">
        <div style="font-size:0.85rem; color:rgba(255,255,255,0.6); margin-bottom:8px;">選手として記録を入力する場合</div>
        <button onclick="switchAccount()" style="background:#059669; color:white; border:none; border-radius:8px; padding:10px 24px; font-size:0.9rem; font-weight:600; cursor:pointer;">
          🔄 選手用記録へ切り替え
        </button>
      </div>`;
  }
})();
</script>

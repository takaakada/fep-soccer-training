<!-- ══════════════════════════════════════════════════════════
     SESSION RECORD — ② 練習後チェック（選手用）
     VFE記録 + F'コンポーネント（dr/uh/fh）
═══════════════════════════════════════════════════════════ -->

<div class="sf-page">
  <div class="sf-header">
    <div class="sf-page-title">▶️ 練習後チェック</div>
    <p class="sf-page-sub">練習のVFEと振り返り（F'）を記録します</p>
  </div>

  <!-- グループ情報バナー -->
  <div id="record-group-banner"></div>

  <!-- プログレスバー -->
  <div id="sf-progress-bar"></div>

  <!-- MTG後チェックサマリー -->
  <div id="sr-precheck-summary" class="sf-alert sf-alert-blue">
    <span class="sf-alert-icon">📋</span>
    <div id="sr-precheck-text">MTG後チェックデータを読み込み中...</div>
  </div>

  <!-- チーム / 個人 切り替え -->
  <div class="sf-card" style="padding:12px 16px;">
    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <label class="sf-label" style="margin:0; min-width:auto;">記録対象：</label>
      <div class="sf-chip-group">
        <button class="sf-chip active" id="sr-mode-team" onclick="setRecordMode('team')">チーム全体</button>
        <button class="sf-chip" id="sr-mode-individual" onclick="setRecordMode('individual')">個人</button>
      </div>
      <div id="sr-player-name-wrap" style="display:none; flex:1; min-width:200px;">
        <input type="text" id="sr-player-name" class="sf-input" placeholder="選手名を入力" style="margin:0;">
      </div>
    </div>
  </div>

  <!-- ══ 2カラムレイアウト: VFE + F' ══ -->
  <div class="sf-grid-2">
    <!-- 左列: VFE 入力 -->
    <div>
      <div class="sf-card">
        <div class="sf-card-title">
          📊 VFE 入力
          <span class="sf-theory-tag tag-vfe">VFE</span>
        </div>

        <!-- Q1: 難易度 (complexity) -->
        <div class="sf-form-row">
          <label class="sf-label"><strong>Q1. 今日の練習について</strong></label>
          <select id="sr-complexity" class="sf-select" onchange="recordSelectChanged()">
            <option value="10">複雑で難しい・うまくできなかった</option>
            <option value="7">練習強度や課題は少し難しく感じた</option>
            <option value="5" selected>チャレンジのレベルは最適だった</option>
            <option value="3">取り組みやすいが、やや単調に感じた</option>
            <option value="0">最低限の単純なパターンだった</option>
          </select>
        </div>

        <div class="sf-separator"></div>

        <!-- Q2: 成功率 (accuracy) -->
        <div class="sf-form-row">
          <label class="sf-label"><strong>Q2. 練習・競技中の身体の動きについて</strong></label>
          <select id="sr-accuracy" class="sf-select" onchange="recordSelectChanged()">
            <option value="10">必要な強度に対応できず、調子が悪い</option>
            <option value="7">普段よりうまくいかず、なんとなく調子が悪かった</option>
            <option value="5" selected>普段通り、調子はまずまずだった</option>
            <option value="3">概ね良好にコントロールできた</option>
            <option value="0">完璧に調整できておりイメージ通りだった</option>
          </select>
        </div>

        <div class="sf-separator"></div>

        <!-- Q3: 重みバイアス (weight) -->
        <div class="sf-form-row">
          <label class="sf-label"><strong>Q3. 動作イメージと身体感覚について</strong></label>
          <select id="sr-weight" class="sf-select" onchange="recordSelectChanged()">
            <option value="2">やりたい動きをイメージできるかが全て</option>
            <option value="1">イメージの方が大事で感覚はそれほど重要ではない</option>
            <option value="0" selected>動作イメージと動いた時の感覚が合うことが重要</option>
            <option value="-1">感覚に合わせてイメージを変えることが重要</option>
            <option value="-2">体の感覚が全て（動いてみないとわからない）</option>
          </select>
        </div>
      </div>
    </div>

    <!-- 右列: F' 入力 + プレビュー -->
    <div>
      <div class="sf-card">
        <div class="sf-card-title">
          🧠 振り返り（F' コンポーネント）
          <span class="sf-theory-tag tag-fprime">F'</span>
        </div>

        <!-- dr: 成長実感 -->
        <div class="sf-form-row">
          <label class="sf-label">成長の実感 (dr)</label>
          <p class="sf-note">今日の練習で成長を感じましたか？</p>
          <div class="sf-slider-row">
            <input type="range" id="sr-dr" min="0" max="10" value="5"
                   oninput="this.nextElementSibling.textContent=this.value; updateFPrimeSelect()">
            <span class="sf-slider-val">5</span>
          </div>
          <div class="sf-scale-ends">
            <span>全く感じない (0)</span><span>とても感じる (10)</span>
          </div>
        </div>

        <div class="sf-separator"></div>

        <!-- uh: 満足感 -->
        <div class="sf-form-row">
          <label class="sf-label">満足感 (uh)</label>
          <p class="sf-note">今日の練習に満足していますか？</p>
          <div class="sf-slider-row">
            <input type="range" id="sr-uh" min="0" max="10" value="5"
                   oninput="this.nextElementSibling.textContent=this.value; updateFPrimeSelect()">
            <span class="sf-slider-val">5</span>
          </div>
          <div class="sf-scale-ends">
            <span>不満 (0)</span><span>とても満足 (10)</span>
          </div>
        </div>

        <div class="sf-separator"></div>

        <!-- fh: 次回への期待 -->
        <div class="sf-form-row">
          <label class="sf-label">次回への期待 (fh)</label>
          <p class="sf-note">次の練習が楽しみですか？</p>
          <div class="sf-slider-row">
            <input type="range" id="sr-fh" min="0" max="10" value="5"
                   oninput="this.nextElementSibling.textContent=this.value; updateFPrimeSelect()">
            <span class="sf-slider-val">5</span>
          </div>
          <div class="sf-scale-ends">
            <span>不安・消極的 (0)</span><span>とても楽しみ (10)</span>
          </div>
        </div>
      </div>

      <!-- リアルタイムプレビュー -->
      <div class="sf-card sf-preview-card">
        <div class="sf-card-title">📐 プレビュー</div>
        <div class="sf-preview-grid">
          <div class="sf-preview-item">
            <div class="sf-preview-label">VFE</div>
            <div class="sf-preview-val" id="pv-vfe">--</div>
            <div class="sf-preview-sub">変分自由エネルギー</div>
          </div>
          <div class="sf-preview-item">
            <div class="sf-preview-label">F'概算</div>
            <div class="sf-preview-val" id="pv-fprime">--</div>
            <div class="sf-preview-sub">dr/uh/fhから</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ボタン -->
  <div class="sf-btn-row">
    <button class="sf-btn sf-btn-primary" onclick="completeRecord()">
      記録を保存
    </button>
  </div>
</div>

<script>
let _recordMode = 'team';

function initRecordPage() {
  // グループバナー表示
  if (currentRole === 'player') {
    GroupContext.renderGroupBanner('record-group-banner');
  } else {
    GroupContext.renderGroupSelector('record-group-banner');
  }

  const progEl = document.getElementById('sf-progress-bar');
  if (progEl) progEl.innerHTML = SessionFlow.renderProgressHtml(1);
  showPreCheckSummary();
  recordSelectChanged();
  updateFPrimeSelect();
}

function setRecordMode(mode) {
  _recordMode = mode;
  document.getElementById('sr-mode-team').classList.toggle('active', mode === 'team');
  document.getElementById('sr-mode-individual').classList.toggle('active', mode === 'individual');
  document.getElementById('sr-player-name-wrap').style.display = mode === 'individual' ? 'block' : 'none';
}

function showPreCheckSummary() {
  const textEl = document.getElementById('sr-precheck-text');
  if (!textEl) return;
  const state = SessionFlow.getState();
  const pc = state.preCheck;
  const computed = state.computed;

  if (!state.startedAt) {
    textEl.innerHTML = 'MTG後チェックが未実施です。<a href="#" onclick="showPage(\'session-pre-check\', document.querySelector(\'.sidebar-nav-btn[data-page=session-pre-check]\'))">MTG後チェックを先に行う</a>';
    return;
  }
  const sigmaMod = computed.sigmaModifier || FepCalc.serotoninToSigma(pc.condition);
  const efe = computed.efe;
  textEl.innerHTML = `<strong>MTG後チェック結果：</strong>
    コンディション=${pc.condition}/10（σ: ${sigmaMod >= 0 ? '+' : ''}${sigmaMod.toFixed(1)}）、
    期待感=${pc.expectation}/10、
    ${efe ? `EFE=${efe.efe_display.toFixed(1)}（認識=${efe.epi_score.toFixed(1)}, 実行=${efe.pra_score.toFixed(1)}）` : 'EFE=未計算'}`;
}

function recordSelectChanged() {
  const complexity = parseInt(document.getElementById('sr-complexity')?.value ?? 5);
  const accuracy   = parseInt(document.getElementById('sr-accuracy')?.value ?? 5);
  const weightValue = parseInt(document.getElementById('sr-weight')?.value ?? 0);

  SessionFlow.updateRecord({ complexity, accuracy: accuracy * 10, weightValue });

  const accuracyScale = accuracy;  // select値は0-10なのでそのまま使用
  const vfe = FepCalc.calcVFE(complexity, accuracyScale, weightValue);

  const vfeEl = document.getElementById('pv-vfe');
  if (vfeEl) {
    vfeEl.textContent = vfe.vfe_display.toFixed(1);
    vfeEl.className = 'sf-preview-val ' +
      (vfe.vfe_display < 40 ? 'val-good' : vfe.vfe_display < 60 ? '' : 'val-warn');
  }
}

// 後方互換: スライダー版の関数名でも呼べるようにする
function recordSliderChanged() { recordSelectChanged(); }

function updateFPrimeSelect() {
  const dr = parseInt(document.getElementById('sr-dr')?.value ?? 5);
  const uh = parseInt(document.getElementById('sr-uh')?.value ?? 5);
  const fh = parseInt(document.getElementById('sr-fh')?.value ?? 5);

  // F' estimate from dr/uh/fh: map 0-10 to -2..+2, average
  const drBipolar = (dr - 5) / 2.5;
  const uhBipolar = (uh - 5) / 2.5;
  const fhBipolar = (fh - 5) / 2.5;
  const fEst = (drBipolar + uhBipolar + fhBipolar) / 3;

  const el = document.getElementById('pv-fprime');
  if (el) {
    el.textContent = fEst.toFixed(2);
    el.className = 'sf-preview-val ' +
      (fEst > 0.3 ? 'val-good' : fEst < -0.3 ? 'val-warn' : '');
  }

  SessionFlow.updatePostEval({ dr, uh, fh });
}

// 後方互換
function updateFPrimePreview() { updateFPrimeSelect(); }

async function completeRecord() {
  recordSelectChanged();
  updateFPrimeSelect();

  const state = SessionFlow.getState();
  const vfe = state.computed.vfe;
  const c = state.computed;

  if (_recordMode === 'individual') {
    const playerName = document.getElementById('sr-player-name')?.value?.trim();
    if (!playerName) {
      alert('選手名を入力してください。');
      document.getElementById('sr-player-name')?.focus();
      return;
    }
  }

  // Supabase に保存（FEP Soccer Training）
  const recordData = {
    vfe_display:  vfe ? vfe.vfe_display : null,
    f_prime:      c.fPrime ? (c.fPrime.f_prime_effective ?? c.fPrime.f_prime ?? 0) : null,
    sigma_mod:    c.sigmaModifier || 0,
    lambda_mod:   c.lambdaModifier || 0,
  };
  const dbId = await persistRecord(recordData);

  if (dbId) {
    alert('練習後チェックを保存しました。');
  } else {
    alert('保存に失敗しました。ネットワークを確認してください。');
  }

  // リセットしてホームへ
  SessionFlow.startSession();
  showPage('home', document.querySelector('.sidebar-nav-btn[data-page="home"]'));
}

initRecordPage();
</script>

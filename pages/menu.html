<div id="menu-page-wrapper">

  <!-- ── Hero ── -->
  <div class="sf-page-hero sf-hero-team">
    <img src="statics/team-up.png" alt="全体トレーニング" class="sf-hero-img">
    <div class="sf-hero-overlay">
      <div class="sf-hero-eyebrow">TEAM · SESSION</div>
      <h1 class="sf-hero-title">📋 全体トレーニング</h1>
      <p class="sf-hero-sub">フェーズ別セッションプランを確認・編集</p>
    </div>
    <button class="sf-hero-action edit-mode-btn" onclick="toggleEditMode()" id="edit-mode-btn">✏️ 編集</button>
  </div>

  <!-- ── グループセレクター ── -->
  <div id="menu-group-selector"></div>

  <!-- ── グループ未選択メッセージ ── -->
  <div id="menu-no-group" style="display:none;">
    <div class="sf-card" style="text-align:center; padding:40px 20px;">
      <div style="font-size:2rem; margin-bottom:12px;">👥</div>
      <div style="font-size:1.1rem; font-weight:700; margin-bottom:8px;">グループを選択してください</div>
      <div style="font-size:0.88rem; color:var(--text-muted);">チーム・カテゴリを選択すると、メニューが表示されます</div>
    </div>
  </div>

  <!-- ── Filter Bar ── -->
  <div id="menu-filter-bar" class="menu-filter-bar">
    <div class="filter-group">
      <label>レイヤー</label>
      <div class="filter-chips" id="filter-layer">
        <button class="filter-chip active" data-val="all" onclick="setFilter('layer','all',this)">全て</button>
        <button class="filter-chip" data-val="L1" onclick="setFilter('layer','L1',this)">L1</button>
        <button class="filter-chip" data-val="L2" onclick="setFilter('layer','L2',this)">L2</button>
        <button class="filter-chip" data-val="L3" onclick="setFilter('layer','L3',this)">L3</button>
        <button class="filter-chip" data-val="L4" onclick="setFilter('layer','L4',this)">L4</button>
      </div>
    </div>
    <div class="filter-group">
      <label>目的</label>
      <div class="filter-chips" id="filter-purpose">
        <button class="filter-chip active" data-val="all" onclick="setFilter('purpose','all',this)">全て</button>
        <button class="filter-chip" data-val="安定化" onclick="setFilter('purpose','安定化',this)">安定化</button>
        <button class="filter-chip" data-val="探索" onclick="setFilter('purpose','探索',this)">探索</button>
        <button class="filter-chip" data-val="修正" onclick="setFilter('purpose','修正',this)">修正</button>
        <button class="filter-chip" data-val="強化" onclick="setFilter('purpose','強化',this)">強化</button>
        <button class="filter-chip" data-val="統合" onclick="setFilter('purpose','統合',this)">統合</button>
      </div>
    </div>
    <div class="filter-group">
      <label>コーチング</label>
      <div class="filter-chips" id="filter-coaching">
        <button class="filter-chip active" data-val="all" onclick="setFilter('coaching','all',this)">全て</button>
        <button class="filter-chip" data-val="safe" onclick="setFilter('coaching','safe',this)">Safe</button>
        <button class="filter-chip" data-val="explore" onclick="setFilter('coaching','explore',this)">Explore</button>
        <button class="filter-chip" data-val="challenge" onclick="setFilter('coaching','challenge',this)">Challenge</button>
        <button class="filter-chip" data-val="positive" onclick="setFilter('coaching','positive',this)">Positive</button>
      </div>
    </div>
  </div>

  <!-- ── Phase Sections (rendered by JS) ── -->
  <div id="phase-container"></div>

  <!-- ── Add Menu Button (edit mode) ── -->
  <div id="menu-add-section" class="add-menu-section" style="display:none;">
    <button class="btn btn-accent" onclick="openAddModal('level','team')">＋ メニューを追加</button>
  </div>

</div><!-- /#menu-page-wrapper -->

<!-- ══════════════════════════════════════════════════════════
     INDIVIDUAL TRAINING — 個別トレーニング
     怪我人・個人向けトレーニングメニュー管理
═══════════════════════════════════════════════════════════ -->

<div class="sf-page">
  <div class="sf-header">
    <div class="sf-page-title">🏃 個別トレーニング</div>
    <p class="sf-page-sub">個人向け・怪我人向けのトレーニングメニューを管理します</p>
  </div>

  <!-- 選手選択 -->
  <div class="sf-card" style="padding:12px 16px;">
    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <label class="sf-label" style="margin:0; min-width:auto;">選手：</label>
      <select id="ind-player-select" class="sf-input" style="flex:1; min-width:180px; max-width:300px;" onchange="onPlayerSelect()">
        <option value="">-- 選手を選択 --</option>
      </select>
      <button class="sf-btn sf-btn-secondary" onclick="addNewPlayer()">＋ 新規選手</button>
    </div>
  </div>

  <!-- 選手未選択時 -->
  <div id="ind-empty" style="text-align:center; padding:60px 20px; color:var(--text-muted);">
    <div style="font-size:2.5rem; margin-bottom:12px;">🏃</div>
    <p style="font-size:1rem;">選手を選択するか、新規登録してメニューを作成してください</p>
  </div>

  <!-- 選手選択後のコンテンツ -->
  <div id="ind-content" style="display:none;">
    <!-- 選手情報ヘッダー -->
    <div class="sf-card" style="border-left:4px solid #2563eb;">
      <div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
        <div style="font-size:2rem;">🧑</div>
        <div style="flex:1;">
          <div id="ind-player-name" style="font-size:1.2rem; font-weight:800;">--</div>
          <div id="ind-player-info" style="font-size:0.82rem; color:var(--text-muted);">--</div>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="sf-btn sf-btn-secondary" style="font-size:0.82rem;" onclick="showPage('player-profile', document.querySelector('.sidebar-nav-btn[data-page=player-profile]'))">📊 プロフィール</button>
        </div>
      </div>
    </div>

    <!-- カテゴリタブ -->
    <div style="display:flex; gap:8px; margin:16px 0; flex-wrap:wrap;">
      <button class="sf-chip active" id="ind-tab-rehab" onclick="switchIndTab('rehab', this)">🏥 リハビリ</button>
      <button class="sf-chip" id="ind-tab-skill" onclick="switchIndTab('skill', this)">⚡ スキル強化</button>
      <button class="sf-chip" id="ind-tab-condition" onclick="switchIndTab('condition', this)">💪 コンディション</button>
      <button class="sf-chip" id="ind-tab-custom" onclick="switchIndTab('custom', this)">📝 カスタム</button>
    </div>

    <!-- メニューリスト -->
    <div id="ind-menu-list"></div>

    <!-- メニュー追加ボタン -->
    <div style="text-align:center; margin-top:16px;">
      <button class="sf-btn sf-btn-primary" onclick="openAddIndMenu()">
        ＋ メニューを追加
      </button>
    </div>
  </div>
</div>

<!-- メニュー追加モーダル -->
<div id="ind-add-modal" class="sf-modal-overlay" style="display:none;">
  <div class="sf-modal" style="max-width:520px;">
    <div class="sf-modal-header">
      <span>個別メニュー追加</span>
      <button onclick="closeAddIndMenu()" style="background:none;border:none;font-size:1.3rem;cursor:pointer;">×</button>
    </div>
    <div style="padding:16px;">
      <div class="sf-form-row">
        <label class="sf-label">メニュー名</label>
        <input type="text" id="ind-new-name" class="sf-input" placeholder="例：膝リハビリ Phase2">
      </div>
      <div class="sf-form-row">
        <label class="sf-label">カテゴリ</label>
        <select id="ind-new-category" class="sf-input">
          <option value="rehab">🏥 リハビリ</option>
          <option value="skill">⚡ スキル強化</option>
          <option value="condition">💪 コンディション</option>
          <option value="custom">📝 カスタム</option>
        </select>
      </div>
      <div class="sf-form-row">
        <label class="sf-label">レイヤー</label>
        <div class="sf-radio-group">
          <label class="sf-radio"><input type="radio" name="ind-new-layer" value="L1" checked> L1</label>
          <label class="sf-radio"><input type="radio" name="ind-new-layer" value="L2"> L2</label>
          <label class="sf-radio"><input type="radio" name="ind-new-layer" value="L3"> L3</label>
          <label class="sf-radio"><input type="radio" name="ind-new-layer" value="L4"> L4</label>
        </div>
      </div>
      <div class="sf-form-row">
        <label class="sf-label">目的</label>
        <div class="sf-chip-group" id="ind-new-purpose">
          <button class="sf-chip" data-value="安定化" onclick="this.classList.toggle('active')">安定化</button>
          <button class="sf-chip" data-value="探索" onclick="this.classList.toggle('active')">探索</button>
          <button class="sf-chip" data-value="修正" onclick="this.classList.toggle('active')">修正</button>
          <button class="sf-chip" data-value="強化" onclick="this.classList.toggle('active')">強化</button>
          <button class="sf-chip" data-value="統合" onclick="this.classList.toggle('active')">統合</button>
        </div>
      </div>
      <div class="sf-form-row">
        <label class="sf-label">時間（分）</label>
        <div class="sf-slider-row">
          <input type="range" id="ind-new-duration" min="5" max="60" value="15" step="5"
                 oninput="this.nextElementSibling.textContent=this.value+'分'">
          <span class="sf-slider-val">15分</span>
        </div>
      </div>
      <div class="sf-form-row">
        <label class="sf-label">メモ・手順</label>
        <textarea id="ind-new-notes" class="sf-input" rows="3" placeholder="手順や注意点を記入..."></textarea>
      </div>
      <div style="text-align:right; margin-top:12px;">
        <button class="sf-btn sf-btn-primary" onclick="saveNewIndMenu()">追加</button>
      </div>
    </div>
  </div>
</div>

<!-- 新規選手モーダル -->
<div id="ind-new-player-modal" class="sf-modal-overlay" style="display:none;">
  <div class="sf-modal" style="max-width:420px;">
    <div class="sf-modal-header">
      <span>新規選手登録</span>
      <button onclick="document.getElementById('ind-new-player-modal').style.display='none'" style="background:none;border:none;font-size:1.3rem;cursor:pointer;">×</button>
    </div>
    <div style="padding:16px;">
      <div class="sf-form-row">
        <label class="sf-label">選手名</label>
        <input type="text" id="ind-np-name" class="sf-input" placeholder="例：田中太郎">
      </div>
      <div class="sf-form-row">
        <label class="sf-label">ポジション</label>
        <select id="ind-np-position" class="sf-input">
          <option value="GK">GK</option>
          <option value="DF">DF</option>
          <option value="MF" selected>MF</option>
          <option value="FW">FW</option>
        </select>
      </div>
      <div class="sf-form-row">
        <label class="sf-label">メモ（怪我・特記事項）</label>
        <textarea id="ind-np-notes" class="sf-input" rows="2" placeholder="例：右膝前十字靭帯 術後3ヶ月"></textarea>
      </div>
      <div style="text-align:right; margin-top:12px;">
        <button class="sf-btn sf-btn-primary" onclick="saveNewPlayer()">登録</button>
      </div>
    </div>
  </div>
</div>

<script>
let _currentPlayerId = '';
let _currentIndTab = 'rehab';

function initIndividualPage() {
  loadPlayerList();
}

// ── 選手管理 ──
function loadPlayerList() {
  const select = document.getElementById('ind-player-select');
  if (!select) return;
  const players = getPlayers();

  // Preserve current selection
  const prevVal = select.value;
  select.innerHTML = '<option value="">-- 選手を選択 --</option>';
  players.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = `${p.name}（${p.position}）`;
    select.appendChild(opt);
  });
  if (prevVal) select.value = prevVal;
}

function getPlayers() {
  try { return JSON.parse(localStorage.getItem('fep_players') || '[]'); } catch(e) { return []; }
}

function savePlayers(players) {
  localStorage.setItem('fep_players', JSON.stringify(players));
}

function addNewPlayer() {
  document.getElementById('ind-new-player-modal').style.display = 'flex';
  document.getElementById('ind-np-name').value = '';
  document.getElementById('ind-np-notes').value = '';
}

function saveNewPlayer() {
  const name = document.getElementById('ind-np-name')?.value?.trim();
  if (!name) { alert('選手名を入力してください。'); return; }

  const players = getPlayers();
  const player = {
    id: 'p_' + Date.now(),
    name,
    position: document.getElementById('ind-np-position')?.value || 'MF',
    notes: document.getElementById('ind-np-notes')?.value || '',
    createdAt: new Date().toISOString(),
  };
  players.push(player);
  savePlayers(players);

  document.getElementById('ind-new-player-modal').style.display = 'none';
  loadPlayerList();

  // Auto-select
  document.getElementById('ind-player-select').value = player.id;
  onPlayerSelect();
}

function onPlayerSelect() {
  const select = document.getElementById('ind-player-select');
  _currentPlayerId = select?.value || '';

  if (!_currentPlayerId) {
    document.getElementById('ind-empty').style.display = 'block';
    document.getElementById('ind-content').style.display = 'none';
    return;
  }

  document.getElementById('ind-empty').style.display = 'none';
  document.getElementById('ind-content').style.display = 'block';

  const players = getPlayers();
  const player = players.find(p => p.id === _currentPlayerId);
  if (player) {
    document.getElementById('ind-player-name').textContent = player.name;
    document.getElementById('ind-player-info').textContent =
      `${player.position} | ${player.notes || '特記事項なし'} | 登録: ${player.createdAt?.slice(0, 10) || '--'}`;
  }

  renderIndMenus();
}

// ── タブ切り替え ──
function switchIndTab(tab, btn) {
  _currentIndTab = tab;
  document.querySelectorAll('[id^="ind-tab-"]').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderIndMenus();
}

// ── メニュー管理 ──
function getIndMenus(playerId) {
  try { return JSON.parse(localStorage.getItem('fep_ind_menus_' + playerId) || '[]'); } catch(e) { return []; }
}

function saveIndMenus(playerId, menus) {
  localStorage.setItem('fep_ind_menus_' + playerId, JSON.stringify(menus));
}

function renderIndMenus() {
  const container = document.getElementById('ind-menu-list');
  if (!container || !_currentPlayerId) return;

  const menus = getIndMenus(_currentPlayerId).filter(m => m.category === _currentIndTab);

  if (menus.length === 0) {
    const catLabels = { rehab: 'リハビリ', skill: 'スキル強化', condition: 'コンディション', custom: 'カスタム' };
    container.innerHTML = `<div style="text-align:center; padding:40px 20px; color:var(--text-muted);">
      <p>${catLabels[_currentIndTab] || _currentIndTab}メニューがまだありません</p>
    </div>`;
    return;
  }

  container.innerHTML = menus.map((m, i) => `
    <div class="sf-card" style="margin-bottom:8px;">
      <div style="display:flex; align-items:flex-start; gap:12px;">
        <div style="flex:1;">
          <div style="font-weight:700; font-size:1rem; margin-bottom:4px;">${m.name}</div>
          <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px;">
            <span class="attr-badge">${m.layer || 'L1'}</span>
            ${(m.purpose || []).map(p => `<span class="attr-badge" style="background:#dbeafe; color:#1e40af;">${p}</span>`).join('')}
            <span class="time-badge">${m.duration || 15}分</span>
          </div>
          ${m.notes ? `<div style="font-size:0.82rem; color:var(--text-muted); line-height:1.4;">${m.notes}</div>` : ''}
        </div>
        <button style="background:none; border:none; font-size:1.1rem; cursor:pointer; color:#dc2626; padding:4px;"
                onclick="deleteIndMenu(${i})" title="削除">🗑</button>
      </div>
    </div>
  `).join('');
}

function openAddIndMenu() {
  document.getElementById('ind-add-modal').style.display = 'flex';
  document.getElementById('ind-new-name').value = '';
  document.getElementById('ind-new-notes').value = '';
  document.getElementById('ind-new-category').value = _currentIndTab;
  // Reset purpose chips
  document.querySelectorAll('#ind-new-purpose .sf-chip').forEach(c => c.classList.remove('active'));
}

function closeAddIndMenu() {
  document.getElementById('ind-add-modal').style.display = 'none';
}

function saveNewIndMenu() {
  const name = document.getElementById('ind-new-name')?.value?.trim();
  if (!name) { alert('メニュー名を入力してください。'); return; }
  if (!_currentPlayerId) { alert('選手を選択してください。'); return; }

  const purpose = Array.from(document.querySelectorAll('#ind-new-purpose .sf-chip.active'))
    .map(c => c.dataset.value);

  const menu = {
    name,
    category: document.getElementById('ind-new-category')?.value || 'custom',
    layer: document.querySelector('input[name="ind-new-layer"]:checked')?.value || 'L1',
    purpose,
    duration: parseInt(document.getElementById('ind-new-duration')?.value ?? 15),
    notes: document.getElementById('ind-new-notes')?.value || '',
    createdAt: new Date().toISOString(),
  };

  const menus = getIndMenus(_currentPlayerId);
  menus.push(menu);
  saveIndMenus(_currentPlayerId, menus);

  closeAddIndMenu();
  renderIndMenus();
}

function deleteIndMenu(index) {
  if (!confirm('このメニューを削除しますか？')) return;
  const menus = getIndMenus(_currentPlayerId);
  const filtered = menus.filter(m => m.category === _currentIndTab);
  const globalIndex = menus.indexOf(filtered[index]);
  if (globalIndex >= 0) {
    menus.splice(globalIndex, 1);
    saveIndMenus(_currentPlayerId, menus);
    renderIndMenus();
  }
}

initIndividualPage();
</script>

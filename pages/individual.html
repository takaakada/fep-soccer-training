<!-- ══════════════════════════════════════════════════════════
     INDIVIDUAL TRAINING — 個別トレーニング
     選手を選択 → タイプ別課題プラン + カスタムメニュー
═══════════════════════════════════════════════════════════ -->

<div class="sf-page">
  <div class="sf-page-hero sf-hero-rehab">
    <img src="statics/rehab.png" alt="個別トレーニング" class="sf-hero-img">
    <div class="sf-hero-overlay">
      <div class="sf-hero-eyebrow">INDIVIDUAL · REHAB</div>
      <h1 class="sf-hero-title">個別トレーニング</h1>
      <p class="sf-hero-sub">選手のエラータイプに基づく課題プランと、カスタムメニューを管理します</p>
    </div>
  </div>

  <!-- ═══ 選手選択（チーム → 選手） ═══ -->
  <div class="sf-card" style="border-left:4px solid #2563eb; margin-bottom:20px;">
    <div class="sf-card-title">👤 選手を選択</div>
    <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end;">
      <!-- チーム選択 -->
      <div style="flex:1; min-width:160px;">
        <label class="sf-label" style="font-size:0.78rem;">チーム</label>
        <select id="ind-team-select" class="sf-input" onchange="onIndTeamChange()">
          <option value="">-- チームを選択 --</option>
        </select>
      </div>
      <!-- 選手選択 -->
      <div style="flex:1; min-width:200px;">
        <label class="sf-label" style="font-size:0.78rem;">選手</label>
        <select id="ind-player-select" class="sf-input" onchange="onIndPlayerChange()" disabled>
          <option value="">-- 選手を選択 --</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ═══ 選手未選択時 ═══ -->
  <div id="ind-empty" style="text-align:center; padding:40px 20px; color:var(--text-muted);">
    <div style="font-size:2rem; margin-bottom:8px;">👤</div>
    <p style="font-size:0.92rem;">チームと選手を選択すると、個別プランが表示されます</p>
  </div>

  <!-- ═══ 選手選択後の全コンテンツ ═══ -->
  <div id="ind-main" style="display:none;">

    <!-- ── 選手情報ヘッダー（タイプ・スコア） ── -->
    <div id="ind-player-header"></div>

    <!-- ═══ セクション1: 個別課題プラン（タイプ別） ═══ -->
    <div class="sf-card" style="border-left:4px solid #7c3aed; margin-bottom:24px;">
      <div class="sf-card-title" style="color:#7c3aed;">🧠 個別課題プラン</div>
      <p id="ind-plan-desc" style="font-size:0.85rem; color:var(--text-muted); margin-bottom:16px;"></p>

      <!-- プランカード一覧 -->
      <div id="ep-plan-cards"></div>
    </div>

    <!-- ═══ プラン詳細表示エリア ═══ -->
    <div id="ep-plan-detail" style="display:none;"></div>

    <!-- ═══ セクション2: 選手別カスタムメニュー ═══ -->
    <div class="sf-card" style="margin-top:24px;">
      <div class="sf-card-title">📋 カスタムメニュー</div>

      <!-- カテゴリタブ -->
      <div style="display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap;">
        <button class="sf-chip active" id="ind-tab-rehab" onclick="switchIndTab('rehab', this)">🏥 リハビリ</button>
        <button class="sf-chip" id="ind-tab-skill" onclick="switchIndTab('skill', this)">⚡ スキル強化</button>
        <button class="sf-chip" id="ind-tab-condition" onclick="switchIndTab('condition', this)">💪 コンディション</button>
        <button class="sf-chip" id="ind-tab-custom" onclick="switchIndTab('custom', this)">📝 カスタム</button>
      </div>

      <!-- メニューリスト -->
      <div id="ind-menu-list"></div>

      <!-- メニュー追加ボタン -->
      <div style="text-align:center; margin-top:12px;">
        <button class="sf-btn sf-btn-secondary" style="font-size:0.85rem;" onclick="openAddIndMenu()">＋ メニューを追加</button>
      </div>
    </div>
  </div>
</div>

<!-- メニュー追加モーダル -->
<div id="ind-add-modal" class="sf-modal-overlay" style="display:none;">
  <div class="sf-modal" style="max-width:520px;">
    <div class="sf-modal-header">
      <span>個別メニュー追加</span>
      <button onclick="closeAddIndMenu()" style="background:none;border:none;font-size:1.3rem;cursor:pointer;">×</button>
    </div>
    <div style="padding:16px;">
      <div class="sf-form-row">
        <label class="sf-label">メニュー名</label>
        <input type="text" id="ind-new-name" class="sf-input" placeholder="例：膝リハビリ Phase2">
      </div>
      <div class="sf-form-row">
        <label class="sf-label">カテゴリ</label>
        <select id="ind-new-category" class="sf-input">
          <option value="rehab">リハビリ</option>
          <option value="skill">スキル強化</option>
          <option value="condition">コンディション</option>
          <option value="custom">カスタム</option>
        </select>
      </div>
      <div class="sf-form-row">
        <label class="sf-label">レイヤー</label>
        <div class="sf-radio-group">
          <label class="sf-radio"><input type="radio" name="ind-new-layer" value="L1" checked> L1</label>
          <label class="sf-radio"><input type="radio" name="ind-new-layer" value="L2"> L2</label>
          <label class="sf-radio"><input type="radio" name="ind-new-layer" value="L3"> L3</label>
          <label class="sf-radio"><input type="radio" name="ind-new-layer" value="L4"> L4</label>
        </div>
      </div>
      <div class="sf-form-row">
        <label class="sf-label">目的</label>
        <div class="sf-chip-group" id="ind-new-purpose">
          <button class="sf-chip" data-value="安定化" onclick="this.classList.toggle('active')">安定化</button>
          <button class="sf-chip" data-value="探索" onclick="this.classList.toggle('active')">探索</button>
          <button class="sf-chip" data-value="修正" onclick="this.classList.toggle('active')">修正</button>
          <button class="sf-chip" data-value="強化" onclick="this.classList.toggle('active')">強化</button>
          <button class="sf-chip" data-value="統合" onclick="this.classList.toggle('active')">統合</button>
        </div>
      </div>
      <div class="sf-form-row">
        <label class="sf-label">時間（分）</label>
        <div class="sf-slider-row">
          <input type="range" id="ind-new-duration" min="5" max="60" value="15" step="5"
                 oninput="this.nextElementSibling.textContent=this.value+'分'">
          <span class="sf-slider-val">15分</span>
        </div>
      </div>
      <div class="sf-form-row">
        <label class="sf-label">メモ・手順</label>
        <textarea id="ind-new-notes" class="sf-input" rows="3" placeholder="手順や注意点を記入..."></textarea>
      </div>
      <div style="text-align:right; margin-top:12px;">
        <button class="sf-btn sf-btn-primary" onclick="saveNewIndMenu()">追加</button>
      </div>
    </div>
  </div>
</div>

<!-- JS is in js/individual.js, initialized via core.js -->
